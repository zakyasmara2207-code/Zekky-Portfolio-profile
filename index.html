<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zekky Asmara | Final Boss Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#05060a;
  --text:#fff;
  --accent:#00bfff;
  --card:rgba(255,255,255,0.05);
}

body.light{
  --bg:#f5f7ff;
  --text:#111;
  --accent:#0066ff;
  --card:rgba(0,0,0,0.05);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  transition:.5s;
}

/* ===== SCROLL BAR ===== */
#progress{
  position:fixed;
  top:0;
  left:0;
  height:4px;
  background:var(--accent);
  width:0%;
  z-index:9999;
}

/* ===== CURSOR ===== */
.cursor{
  position:fixed;
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--accent);
  pointer-events:none;
  box-shadow:0 0 25px var(--accent);
  transform:translate(-50%,-50%);
  z-index:999;
}

/* ===== NAV ===== */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:18px 8%;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,0.35);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:100;
}

.logo{
  font-weight:700;
  color:var(--accent);
}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:var(--text);
}

nav a:hover{
  color:var(--accent);
}

.toggle{
  cursor:pointer;
  padding:6px 12px;
  border-radius:10px;
  background:var(--card);
}

/* ===== SECTIONS ===== */
section{
  min-height:100vh;
  padding:120px 8%;
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

section.show{
  opacity:1;
  transform:translateY(0);
}

/* ===== HERO ===== */
.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.hero h1{
  font-size:60px;
}

.hero span{
  color:var(--accent);
}

.typing{
  margin-top:10px;
  color:gray;
  min-height:25px;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 24px;
  background:var(--accent);
  color:white;
  border-radius:12px;
  text-decoration:none;
  transition:.3s;
}

.btn:hover{transform:scale(1.05);}

/* ===== 3D CARD ===== */
.card3d{
  width:330px;
  height:430px;
  border-radius:25px;
  overflow:hidden;
  background:var(--card);
  backdrop-filter:blur(20px);
  transform-style:preserve-3d;
  transition:.2s;
  border:1px solid rgba(255,255,255,0.1);
}

.card3d img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}

.box{
  padding:25px;
  border-radius:18px;
  background:var(--card);
  border:1px solid rgba(255,255,255,0.1);
  transition:.3s;
}

.box:hover{
  transform:translateY(-10px) scale(1.03);
}

/* ===== PARALLAX BG ===== */
#bg{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at top,#00bfff22,transparent 50%),
             radial-gradient(circle at bottom,#7b2fff22,transparent 50%);
  z-index:-1;
}

/* ===== CHAT ===== */
#chatbox{
  position:fixed;
  bottom:20px;
  right:20px;
  width:260px;
  background:var(--card);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  padding:10px;
  backdrop-filter:blur(15px);
  font-size:13px;
}

/* ===== FOOTER ===== */
footer{
  text-align:center;
  padding:30px;
  color:gray;
}

</style>
</head>

<body>

<div id="progress"></div>
<div class="cursor"></div>
<div id="bg"></div>

<header>
<div class="logo">FINAL BOSS</div>
<nav>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#work">Work</a>
</nav>
<div class="toggle" onclick="toggle()">Mode</div>
</header>

<section class="hero" id="home">

<div>
<h1>Hi, I'm <span>Zekky asmara</span></h1>
<div class="typing" id="typing"></div>
<p>Building ultra modern web experience & interactive digital design.</p>
<a class="btn" href="#work">Explore</a>
</div>

<div class="card3d" id="card">
<img src="profil.jpg">
</div>

</section>

<section id="about">
<h2>About <span style="color:var(--accent)">Me</span></h2>

<div class="grid">
<div class="box">UI/UX Design</div>
<div class="box">Brand Identity</div>
<div class="box">Web Dev</div>
</div>
</section>

<section id="work">
<h2>My <span style="color:var(--accent)">Work</span></h2>

<div class="grid">
<div class="box">Landing Page</div>
<div class="box">Business Site</div>
<div class="box">Portfolio UI</div>
</div>
</section>

<footer>© 2026 Zekky Asmara</footer>

<!-- CHAT -->
<div id="chatbox">
🤖 AI: Halo! Ini portfolio kamu versi FINAL BOSS 🚀
</div>

<script>

/* SCROLL PROGRESS */
window.onscroll=()=>{
  let winScroll=document.body.scrollTop || document.documentElement.scrollTop;
  let height=document.documentElement.scrollHeight - document.documentElement.clientHeight;
  document.getElementById("progress").style.width=(winScroll/height)*100+"%";
}

/* CURSOR */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",(e)=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

/* SECTION REVEAL */
const sections=document.querySelectorAll("section");
const obs=new IntersectionObserver(e=>{
  e.forEach(el=>{
    if(el.isIntersecting) el.target.classList.add("show");
  })
});
sections.forEach(s=>obs.observe(s));

/* TYPING */
const words=["Web Designer","Creative Developer","UI/UX Builder"];
let i=0,j=0,del=false;

function type(){
  let txt=words[i];
  document.getElementById("typing").innerHTML=txt.substring(0,j);

  if(!del && j<txt.length) j++;
  else if(del && j>0) j--;
  else if(j===txt.length){del=true;setTimeout(type,1000);return;}
  if(j===0){del=false;i=(i+1)%words.length;}

  setTimeout(type,80);
}
type();

/* 3D CARD */
const card=document.getElementById("card");
card.addEventListener("mousemove",(e)=>{
  let x=e.offsetX-card.offsetWidth/2;
  let y=e.offsetY-card.offsetHeight/2;
  card.style.transform=`rotateY(${x/15}deg) rotateX(${-y/15}deg)`;
});
card.addEventListener("mouseleave",()=>{
  card.style.transform="rotateY(0) rotateX(0)";
});

/* DARK MODE */
function toggle(){
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
